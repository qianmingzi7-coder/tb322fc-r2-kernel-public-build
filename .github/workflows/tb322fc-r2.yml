name: TB322FC R2 ReSukiSU 6.6.111

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:
  push:
    branches:
      - codex/tb322fc-r2-kpm-fix
    paths:
      - .github/workflows/tb322fc-r2.yml
      - .github/workflows/build.yml
      - .github/patches/**

jobs:
  build-tb322fc-r2:
    uses: ./.github/workflows/build.yml
    secrets: inherit
    with:
      android_version: android15
      kernel_version: "6.6"
      sub_level: "111"
      os_patch_level: "2025-10"
      revision: r1
      ksu_variant: ReSukiSU
      version: "6.6.111-android15-8-g02abbec53650-abogki436492307-4k"
      build_time: N
      use_zram: true
      use_bbg: false
      use_kpm: patched
      use_rekernel: false
      cve_2026_43499_patch: false
      enable_susfs: true
      supp_op: false
      droidspaces: off
      droidspaces_ntsync: false
      artifact_upload_mode: "上传全部"
